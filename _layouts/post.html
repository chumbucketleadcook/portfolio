<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} — Richard Antoine</title>
  <style>@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap');</style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0e0e0e; --ink-muted: #5a5a5a; --ink-faint: #999;
      --paper: #f8f5f0; --accent: #c84b2f; --rule: #d8d2c8;
      --mono: 'DM Mono', monospace;
      --serif: 'Instrument Serif', Georgia, serif;
      --sans: 'Syne', system-ui, sans-serif;
    }
    body { background: var(--paper); color: var(--ink); font-family: var(--sans); font-size: 16px; line-height: 1.6; }
    nav { background: #0e0e0e; border-bottom: 1px solid rgba(255,255,255,0.08); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .nav-brand { font-family: var(--mono); font-size: 13px; font-weight: 500; letter-spacing: 0.04em; color: #f8f5f0; text-decoration: none; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(248,245,240,0.5); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--accent); }
    .post { max-width: 720px; margin: 0 auto; padding: 4rem 2rem 6rem; }
    .post-eyebrow { font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }
    .post-title { font-family: var(--serif); font-size: clamp(2rem, 4vw, 3rem); line-height: 1.1; margin-bottom: 1.5rem; }
    .post-meta { font-family: var(--mono); font-size: 12px; color: var(--ink-faint); margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid var(--rule); }
    .post-content h1, .post-content h2, .post-content h3 { font-family: var(--serif); line-height: 1.2; margin: 2.5rem 0 1rem; }
    .post-content h2 { font-size: 1.6rem; }
    .post-content h3 { font-size: 1.25rem; }
    .post-content p { margin-bottom: 1.5rem; color: var(--ink-muted); line-height: 1.8; }
    .post-content a { color: var(--accent); }
    .post-content code { font-family: var(--mono); font-size: 13px; background: #f0ece4; padding: 2px 6px; border-radius: 2px; }
    .post-content pre { background: #0e0e0e; color: #f8f5f0; padding: 1.5rem; border-radius: 4px; overflow-x: auto; margin-bottom: 1.5rem; }
    .post-content pre code { background: none; padding: 0; color: inherit; font-size: 13px; }
    .post-content ul, .post-content ol { padding-left: 1.5rem; margin-bottom: 1.5rem; color: var(--ink-muted); }
    .post-content li { margin-bottom: 0.5rem; line-height: 1.8; }
    .post-content img { max-width: 100%; border-radius: 4px; margin: 2rem 0; }
    .back-link { display: inline-block; font-family: var(--mono); font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-faint); text-decoration: none; margin-bottom: 2.5rem; }
    .back-link:hover { color: var(--accent); }
    footer { max-width: 720px; margin: 0 auto; padding: 2rem; border-top: 1px solid var(--rule); font-family: var(--mono); font-size: 12px; color: var(--ink-faint); text-align: center; }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">richard-antoine.com</a>
  <ul class="nav-links">
    <li><a href="/#writing">Writing</a></li>
    <li><a href="/#projects">Projects</a></li>
    <li><a href="/#about">About</a></li>
    <li><a href="mailto:raantoine915@gmail.com">Contact</a></li>
  </ul>
</nav>

<article class="post">
  <a href="/" class="back-link">← Back to home</a>
  <p class="post-eyebrow">{{ page.category }}</p>
  <h1 class="post-title">{{ page.title }}</h1>
  <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}</p>
  <div class="post-content">
    {{ content }}
  </div>
</article>

<footer>© 2026 Richard Antoine</footer>

<script>hljs.highlightAll();</script>
</body>
</html>
